name: Deploy to S3

on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "*.json"
      - "*.webp"
      - "*.ico"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws s3 cp index.html s3://picoclaw.io/index.html
          aws s3 cp releases.json s3://picoclaw.io/releases.json
          aws s3 cp logo.webp s3://picoclaw.io/logo.webp
          aws s3 cp favicon.ico s3://picoclaw.io/favicon.ico

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws cloudfront create-invalidation --distribution-id EC2YSW0R0BOS6 --paths "/*"
